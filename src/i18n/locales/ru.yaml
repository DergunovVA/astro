# Русский каталог сообщений для Astro DSL
# Используется для сообщений об ошибках, предупреждений и текста для пользователя

# Ошибки валидации
errors:
  # Ошибки ретроградности
  retrograde_not_allowed: "{planet} не может быть ретроградным!"
  retrograde_explanation: |
    Ретроградными могут быть только планеты: Mercury, Venus, Mars, Jupiter, Saturn, Uranus, Neptune, Pluto.
    {planet} НИКОГДА не бывает ретроградным.
    
    Солнце и Луна всегда директные (не ретроградные).
    Асцендент (Asc), MC, IC, DSC — это углы карты, а не небесные тела.
    
  # Валидация домов
  house_range_error: "Номер дома должен быть 1-12, получено {num}"
  house_range_explanation: |
    В астрологии в гороскопе ровно 12 домов.
    Допустимые номера домов: 1 (Асцендент), 2, 3, ..., 10 (MC), 11, 12.
    
  # Валидация градусов
  degree_range_error: "Градус должен быть 0-{max}°, получено {degree}°"
  degree_in_sign_explanation: |
    Каждый знак зодиака содержит 30 градусов (0° - 29°59').
    Допустимый диапазон: 0-29 градусов внутри знака.
    
  degree_absolute_explanation: |
    Круг зодиака содержит 360 градусов всего.
    Допустимый диапазон: 0-359 градусов абсолютной позиции.
    
  # Ошибки аспектов
  planet_aspect_self: "Планета не может иметь аспект к самой себе!"
  planet_aspect_explanation: |
    Проверьте формулу: Asp({planet1}, {planet2}, ...)
    {planet1} и {planet2} должны быть разными небесными телами.
    
  # Ошибки достоинств
  dignity:
    ruler_error: "{planet}.Ruler == {target} бессмысленна!"
    ruler_explanation: |
      Планета не "управляет" другой планетой.
      Планета управляет ЗНАКОМ (или находится в знаке, которым управляет).
      
      Пример: Mars.Sign == Aries (Марс в знаке, которым управляет)
      
    exaltation_error: "{planet} экзальтирован в {correct_sign}, НЕ в {wrong_sign}!"
    exaltation_list: |
      Экзальтации планет (традиционные):
      • Sun: Aries (19°)
      • Moon: Taurus (3°)
      • Mercury: Virgo (15°)
      • Venus: Pisces (27°)
      • Mars: Capricorn (28°)
      • Jupiter: Cancer (15°)
      • Saturn: Libra (21°)
      
    detriment_error: "{planet} в изгнании в {sign}!"
    detriment_explanation: |
      Планета в изгнании находится в знаке, противоположном её управлению.
      Это ослабляет проявление планеты.
      
    fall_error: "{planet} в падении в {sign}!"
    fall_explanation: |
      Планета в падении находится в знаке, противоположном её экзальтации.
      Это наиболее слабая позиция для планеты.

# Предупреждения валидации
warnings:
  planet_weak: "{planet} в {dignity} в {sign}"
  planet_weak_details: "Планета в слабой позиции (изгнание или падение), может проявляться с трудом."
  
  conflicting_conditions: "Обнаружены противоречащие условия"
  conflicting_explanation: |
    Ваша формула содержит взаимоисключающие условия, которые не могут быть истинными одновременно.
    Пример: Sun.Sign == Aries AND Sun.Sign == Taurus
    
  rare_combination: "Редкая астрологическая комбинация"
  rare_explanation: "Эта комбинация астрономически возможна, но очень редка на практике."

# Подсказки и помощь
suggestions:
  try_instead: "Попробуйте вместо этого:"
  examples: "Примеры:"
  did_you_mean: "Возможно, вы имели в виду:"
  
  check_formula: "Проверьте формулу на опечатки или логические ошибки."
  check_data: "Проверьте данные рождения (дата, время, место)."
  
